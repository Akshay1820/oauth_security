spring.application.name=outh_security

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_REDIRECTION_URL}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECTION_URL}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

angular.frontend.url=${FRONTEND_URL:http://localhost:4200}
angular.frontend.callback=${FRONTEND_CALLBACK_URL:http://localhost:4200/auth/callback?token=}

# JWT properties
app.jwt.secret=MySuperSecretKeyThatIsLongEnough1234567890AB
app.jwt.expiration= 3600000

# Postgres Database config
spring.datasource.url=jdbc:postgresql://${DB_URL}/${DB_NAME}?sslmode=require&channel_binding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update