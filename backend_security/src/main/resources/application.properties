spring.application.name=outh_security
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_REDIRECTION_URL}
angular.frontend.url=${FRONTEND_URL:http://localhost:4200}
angular.frontend.callback=${FRONTEND_CALLBACK_URL:http://localhost:4200/auth/callback?token=}

! JWT properties
app.jwt.secret=MySuperSecretKeyThatIsLongEnough1234567890AB
app.jwt.expiration= 3600000